[platformio]
default_envs = native
test_dir = .

[env]
framework = arduino
build_flags = -std=c++17 -DUNIT_TEST

[env:native]
platform = native
test_framework = unity

[env:esp32]
platform = espressif32
board = esp32dev
test_framework = unity

[env:uno]
platform = atmelavr
board = uno
test_framework = unity