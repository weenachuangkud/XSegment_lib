[platformio]
default_envs = native

[env:native]
platform = native
build_flags = -std=c++17 -DUNIT_TEST
test_framework = unity
test_build_project_src = yes

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -DUNIT_TEST
test_framework = unity
test_build_project_src = yes