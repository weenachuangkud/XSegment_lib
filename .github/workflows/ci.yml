name: XSegment_lib CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# ─────────────────────────────────────────
#  Job 1 — Desktop Unit Tests
# ─────────────────────────────────────────

  unit_tests:
    name: Unit Tests (Desktop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Run all tests via Makefile
        run: |
          cd tests
          make


# ─────────────────────────────────────────
#  Job 2 — Compile for AVR
# ─────────────────────────────────────────

  build_avr:
    name: Build AVR (Arduino Uno)
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install library
        run: |
          mkdir -p $HOME/Arduino/libraries
          cp -r . $HOME/Arduino/libraries/XSegment_lib

      - name: Compile all AVR examples
        run: |
          if [ ! -d examples ]; then
            echo "No examples directory present. Skipping AVR compile."
            exit 0
          fi
          for example in \
            examples/TM1637/Basic/Basic.ino \
            examples/TM1638/Basic/Basic.ino \
            examples/MAX7219/Basic/Basic.ino \
            examples/HT16K33/Basic/Basic.ino \
            examples/GPIO/SevenSeg/SevenSeg.ino \
            examples/GPIO/FourteenSeg/FourteenSeg.ino
          do
            echo "Compiling $example"
            arduino-cli compile \
              --fqbn arduino:avr:uno \
              $example
          done


# ─────────────────────────────────────────
#  Job 3 — Compile for ESP32
# ─────────────────────────────────────────

  build_esp32:
    name: Build ESP32
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index \
            --additional-urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 \
            --additional-urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install library
        run: |
          mkdir -p $HOME/Arduino/libraries
          cp -r . $HOME/Arduino/libraries/XSegment_lib

      - name: Compile all ESP32 examples
        run: |
          if [ ! -d examples ]; then
            echo "No examples directory present. Skipping ESP32 compile."
            exit 0
          fi
          for example in \
            examples/TM1637/Basic/Basic.ino \
            examples/MAX7219/Basic/Basic.ino \
            examples/HT16K33/Basic/Basic.ino
          do
            echo "Compiling $example"
            arduino-cli compile \
              --fqbn esp32:esp32:esp32 \
              $example
          done


# ─────────────────────────────────────────
#  Job 4 — Compile for RP2040
# ─────────────────────────────────────────

  build_rp2040:
    name: Build RP2040 (Pico)
    runs-on: ubuntu-latest
    needs: unit_tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install RP2040 core
        run: |
          arduino-cli core update-index \
            --additional-urls \
            https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core install rp2040:rp2040 \
            --additional-urls \
            https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json

      - name: Install library
        run: |
          mkdir -p $HOME/Arduino/libraries
          cp -r . $HOME/Arduino/libraries/XSegment_lib

      - name: Compile all RP2040 examples
        run: |
          if [ ! -d examples ]; then
            echo "No examples directory present. Skipping RP2040 compile."
            exit 0
          fi
          for example in \
            examples/TM1637/Basic/Basic.ino \
            examples/MAX7219/Basic/Basic.ino
          do
            echo "Compiling $example"
            arduino-cli compile \
              --fqbn rp2040:rp2040:rpipico \
              $example
          done


# ─────────────────────────────────────────
#  Job 5 — Validate Library Structure
# ─────────────────────────────────────────

  validate_library:
    name: Validate Library Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f library.properties && echo "library.properties OK"
          test -f keywords.txt       && echo "keywords.txt OK"
          test -f README.md          && echo "README.md OK"
          test -d src                && echo "src/ OK"
          if [ -d examples ]; then
            echo "examples/ OK"
          else
            echo "examples/ missing, skipping example validation"
          fi

      - name: Check no Windows line endings
        run: |
          ! grep -rl $'\r' src/
